name: .NET 10 Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ST10330209PROG7311POE1.slnx

    - name: Build the solution
      run: dotnet build ST10330209PROG7311POE1.slnx --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test ST10330209PROG7311POE1.Tests/ST10330209PROG7311POE1.Tests.csproj --configuration Release --no-build --verbosity normal
